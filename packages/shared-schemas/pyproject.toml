[project]
name = "aetherville-schemas"
version = "0.1.0"
description = "Shared Pydantic and generated TypeScript schemas for Project Aetherville"
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/python/aetherville_schemas"]
