name: aetherville

services:
  orchestrator:
    build:
      context: .
      dockerfile: infra/docker/server.Dockerfile
    command: uv run uvicorn aetherville_server.main:app --host 0.0.0.0 --port 8080
    environment:
      AETHERVILLE_VISION_URL: http://vision:8001
      AETHERVILLE_VLLM_URL: http://vllm:8000/v1
      AETHERVILLE_REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      vision:
        condition: service_started
      vllm:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/v1/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  vision:
    build:
      context: .
      dockerfile: infra/docker/server.Dockerfile
    command: uv run uvicorn aetherville_server.vision:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  vllm:
    build:
      context: .
      dockerfile: infra/docker/server.Dockerfile
    command: uv run uvicorn aetherville_server.vllm_fallback:app --host 0.0.0.0 --port 8000
    environment:
      AETHERVILLE_VLLM_MODE: mock
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
